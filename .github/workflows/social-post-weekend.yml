name: Weekend Roundup Post

on:
  schedule:
    - cron: '0 16 * * 4'   # Thursday, 12 PM EDT (UTC-4); runs at 11 AM EST in winter
  workflow_dispatch:         # allow manual runs from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages

      - name: Post this weekend's events
        run: node scripts/post-roundup.js --window weekend
        working-directory: packages
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
